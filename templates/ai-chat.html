<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Palatine AI Chat Test</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Geologica', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f1419 0%, #1a1f2e 100%);
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            width: 100%;
            max-width: 800px;
            background: rgba(20, 25, 40, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(100, 200, 255, 0.1);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            height: 600px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        
        .header {
            padding: 20px;
            border-bottom: 1px solid rgba(100, 200, 255, 0.1);
            background: rgba(10, 15, 30, 0.5);
        }
        
        .header h1 {
            font-size: 20px;
            color: #00d9ff;
            margin-bottom: 5px;
        }
        
        .header p {
            font-size: 12px;
            color: #888;
        }
        
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .message {
            display: flex;
            gap: 10px;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .message.user {
            justify-content: flex-end;
        }
        
        .message.user .content {
            background: #00a8e0;
            color: #fff;
            border-radius: 12px 12px 2px 12px;
        }
        
        .message.assistant .content {
            background: rgba(50, 70, 100, 0.8);
            border-radius: 12px 12px 12px 2px;
            border: 1px solid rgba(100, 200, 255, 0.2);
        }
        
        .message.system {
            justify-content: center;
        }
        
        .message.system .content {
            background: rgba(100, 100, 100, 0.5);
            font-size: 12px;
            border-radius: 6px;
        }
        
        .content {
            padding: 12px 16px;
            max-width: 70%;
            word-wrap: break-word;
            white-space: pre-wrap;
        }
        
        .message-label {
            font-size: 10px;
            color: #666;
            margin-bottom: 4px;
            text-align: right;
        }
        
        .message.user .message-label {
            text-align: right;
        }
        
        .message.assistant .message-label {
            text-align: left;
        }
        
        .input-area {
            padding: 20px;
            border-top: 1px solid rgba(100, 200, 255, 0.1);
            background: rgba(10, 15, 30, 0.5);
            display: flex;
            gap: 10px;
        }
        
        .input-field {
            flex: 1;
            background: rgba(30, 40, 60, 0.8);
            border: 1px solid rgba(100, 200, 255, 0.2);
            border-radius: 8px;
            padding: 12px 16px;
            color: #e0e0e0;
            font-family: inherit;
            font-size: 14px;
        }
        
        .input-field:focus {
            outline: none;
            border-color: rgba(100, 200, 255, 0.6);
            background: rgba(30, 40, 60, 1);
        }
        
        button {
            background: linear-gradient(135deg, #00a8e0 0%, #0080b0 100%);
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 12px 24px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 168, 224, 0.4);
        }
        
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .loading {
            display: inline-block;
            width: 4px;
            height: 4px;
            background: #00d9ff;
            border-radius: 50%;
            animation: blink 1.2s infinite;
            margin-left: 4px;
        }
        
        @keyframes blink {
            0%, 20%, 50%, 80%, 100% { opacity: 1; }
            40% { opacity: 0.3; }
            60% { opacity: 0.6; }
        }
        
        .intent-badge {
            display: inline-block;
            background: rgba(100, 200, 255, 0.2);
            border: 1px solid rgba(100, 200, 255, 0.4);
            border-radius: 4px;
            padding: 2px 8px;
            font-size: 10px;
            margin-top: 4px;
            color: #00d9ff;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🛰️ Palatine AI Assistant</h1>
            <p>Test the new AI system prompts • Gemma 4 Powered</p>
        </div>
        
        <div class="chat-messages" id="messages"></div>
        
        <div class="input-area">
            <input 
                type="text" 
                class="input-field" 
                id="promptInput" 
                placeholder="Ask me about Palatine, add ground stations, analyze links..."
                autocomplete="off"
            >
            <button id="sendBtn" onclick="sendPrompt()">Send</button>
        </div>
    </div>

    <script>
        const messagesDiv = document.getElementById('messages');
        const promptInput = document.getElementById('promptInput');
        const sendBtn = document.getElementById('sendBtn');

        // Current project state (in-memory)
        let projectState = {
            project: {
                name: "Test Project",
                created: new Date().toISOString(),
                modified: new Date().toISOString(),
                version: "2.0"
            },
            constellations: [],
            ground_stations: []
        };

        function addMessage(text, type = 'assistant', intent = null) {
            const msg = document.createElement('div');
            msg.className = `message ${type}`;
            
            const label = document.createElement('div');
            label.className = 'message-label';
            label.textContent = type === 'user' ? 'You' : type === 'system' ? 'System' : 'Palatine AI';
            
            const content = document.createElement('div');
            content.className = 'content';
            content.textContent = text;
            
            msg.appendChild(label);
            msg.appendChild(content);
            
            if (intent) {
                const badge = document.createElement('div');
                badge.className = 'intent-badge';
                badge.textContent = `Intent: ${intent}`;
                msg.lastChild.appendChild(badge);
            }
            
            messagesDiv.appendChild(msg);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        async function sendPrompt() {
            const text = promptInput.value.trim();
            if (!text) return;
            
            promptInput.value = '';
            sendBtn.disabled = true;
            
            // Add user message
            addMessage(text, 'user');
            
            try {
                // Step 1: Classify intent
                addMessage('Classifying intent' + '<div class="loading"></div>', 'system');
                
                const classifyRes = await fetch('/api/ai/classify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: text })
                });
                
                const classifyData = await classifyRes.json();
                const intent = classifyData.intent;
                
                // Remove loading message
                messagesDiv.removeChild(messagesDiv.lastChild);
                
                // Step 2: Execute prompt
                const promptRes = await fetch('/api/ai/prompt', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        prompt: text,
                        intent: intent,
                        project_state: projectState
                    })
                });
                
                const promptData = await promptRes.json();
                
                if (promptData.type === 'text') {
                    // Read-only response
                    addMessage(promptData.response, 'assistant', intent);
                } else if (promptData.type === 'state_update') {
                    // Update state
                    projectState = promptData.updated_state;
                    addMessage(`✓ Project updated successfully!\n\nGround Stations: ${projectState.ground_stations.length}\nConstellations: ${projectState.constellations.length}`, 'assistant', intent);
                } else if (promptData.error) {
                    addMessage(`Error: ${promptData.error}`, 'assistant');
                }
            } catch (error) {
                addMessage(`Network error: ${error.message}`, 'assistant');
            }
            
            sendBtn.disabled = false;
            promptInput.focus();
        }

        promptInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !sendBtn.disabled) {
                sendPrompt();
            }
        });

        // Welcome message
        window.addEventListener('load', () => {
            addMessage('Hello! I\'m Palatine\'s AI assistant. I can:\n\n• Answer questions about satellite mission planning\n• Help you design constellations\n• Manage ground stations\n• Analyze link budgets and coverage\n\nTry asking me something!', 'assistant');
            promptInput.focus();
        });
    </script>
</body>
</html>
