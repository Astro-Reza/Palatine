<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Constellation Menu</title>
<style>
    /* Import Geologica font */
    @import url('https://fonts.googleapis.com/css2?family=Geologica:wght@400;500;600&display=swap');

    body {
        /* A dark background to match the environment */
        background-color: #0f0f0f; 
        margin: 0;
        padding: 40px;
        display: flex;
        justify-content: center;
    }

    .menu-container {
        font-family: 'Geologica', sans-serif;
        width: 100%;
        max-width: 450px;
        color: white;
        padding-bottom: 20px;
        border-bottom: 1px solid #333; /* Subtle dividing line at the bottom */
    }

    .header-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
    }

    .header-row h1 {
        font-size: 24px;
        font-weight: 600;
        margin: 0;
        letter-spacing: 0.5px;
    }

    .icon-group {
        display: flex;
        align-items: center;
        gap: 16px;
    }

    .icon-group img {
        width: 24px;
        height: 24px;
        cursor: pointer;
        transition: opacity 0.2s;
    }

    .icon-group img:hover {
        opacity: 0.7;
    }

    .action-row {
        display: flex;
        gap: 12px;
    }

    button {
        font-family: 'Geologica', sans-serif;
        font-size: 15px;
        font-weight: 400;
        padding: 10px 18px;
        border-radius: 6px;
        border: none;
        cursor: pointer;
        transition: opacity 0.2s;
    }

    button:hover {
        opacity: 0.8;
    }

    .btn-dark {
        background-color: #4a4a4a;
        color: white;
    }

    .btn-green {
        background-color: #D9FF7F;
        color: #111; /* Dark text for contrast against the light green */
        padding: 10px 32px; /* Making the Add button slightly wider like in the image */
        font-weight: 500;
    }
</style>
</head>
<body>

<div class="menu-container">
    <div class="header-row">
        <h1>Constellation List</h1>
        <div class="icon-group">
            <img src="../static/icon/toogleWindow.svg" alt="Toggle Window">
            <img src="../static/icon/leftArrow.svg" alt="Back">
        </div>
    </div>
    
    <div class="action-row">
        <button class="btn-dark">Variables</button>
        <button class="btn-dark">Presets</button>
        <button class="btn-green">Add</button>
    </div>
</div>

</body>
</html>
